<link rel="stylesheet" href="components/section-gpu-monitor.css">

<section id="gpu-monitor" class="section" aria-labelledby="gpu-monitor-title">
    <div class="gpu-page-shell">
        <div class="gpu-hero">
            <div>
                <p class="gpu-eyebrow" data-i18n="gpuMonitor.heroEyebrow">Local AI Runtime</p>
                <h2 id="gpu-monitor-title" data-i18n="gpuMonitor.title">GPU监控面板</h2>
                <p class="gpu-hero-subtitle" data-i18n="gpuMonitor.heroSubtitle">集中查看 GPU 负载、模型调度、队列和 Python 控制器状态。</p>
            </div>
            <div class="gpu-hero-actions">
                <span id="controllerConnectionStatus" class="status-badge offline">
                    <i class="fas fa-circle"></i> <span data-i18n="gpuMonitor.disconnected">未连接</span>
                </span>
                <button id="refreshGpuStatusBtn" class="btn btn-primary btn-sm" data-i18n-title="common.refresh" title="刷新">
                    <i class="fas fa-sync-alt"></i> <span data-i18n="common.refresh">刷新</span>
                </button>
            </div>
        </div>

        <div class="gpu-monitor-container">
            <div class="gpu-status-panel monitor-panel panel-feature">
                <div class="panel-header">
                    <h3><i class="fas fa-microchip"></i> <span data-i18n="gpuMonitor.gpuStatus">GPU状态</span></h3>
                </div>

                <div id="gpuStatusContent" class="gpu-status-content">
                    <div class="status-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span data-i18n="common.loading">加载中...</span>
                    </div>
                </div>
            </div>

            <div class="queue-status-panel monitor-panel panel-compact">
                <div class="panel-header">
                    <h3><i class="fas fa-list-ol"></i> <span data-i18n="gpuMonitor.queueStatus">队列状态</span></h3>
                </div>

                <div id="queueStatusContent" class="queue-status-content">
                    <div class="status-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span data-i18n="common.loading">加载中...</span>
                    </div>
                </div>
            </div>

            <div class="gpu-charts-panel monitor-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-chart-line"></i> <span data-i18n="gpuMonitor.gpuHistory">历史监控</span></h3>
                    <div class="chart-tabs" role="tablist" aria-label="GPU chart metrics">
                        <button class="chart-tab active" data-chart-type="utilization" data-i18n="gpuMonitor.gpuUtilization">使用率</button>
                        <button class="chart-tab" data-chart-type="temperature" data-i18n="gpuMonitor.temperature">温度</button>
                        <button class="chart-tab" data-chart-type="memory" data-i18n="gpuMonitor.memory">显存</button>
                        <button class="chart-tab" data-chart-type="power" data-i18n="gpuMonitor.power">功耗</button>
                    </div>
                </div>

                <div id="gpuChartContent" class="gpu-chart-content">
                    <canvas id="gpuChart"></canvas>
                </div>
            </div>

            <div class="model-switch-panel monitor-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-cubes"></i> <span data-i18n="gpuMonitor.modelWorkbench">模型调度</span></h3>
                    <button id="refreshModelsListBtn" class="btn btn-outline btn-sm" data-i18n-title="common.refresh" title="刷新模型列表">
                        <i class="fas fa-sync-alt"></i> <span data-i18n="common.refresh">刷新</span>
                    </button>
                </div>

                <div id="currentModelInfo" class="current-model-container"></div>

                <div id="quickSwitchContent" class="quick-switch-content">
                    <div class="status-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span data-i18n="common.loading">加载中...</span>
                    </div>
                </div>
            </div>

            <div class="python-service-panel monitor-panel">
                <div class="panel-header">
                    <h3><i class="fab fa-python"></i> <span data-i18n="gpuMonitor.pythonService">Python服务控制</span></h3>
                    <button id="refreshServiceStatusBtn" class="btn btn-outline btn-sm" data-i18n-title="common.refresh" title="刷新状态">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <div id="pythonServiceStatus" class="python-service-status">
                    <div class="status-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span data-i18n="common.loading">加载中...</span>
                    </div>
                </div>

                <div class="service-control-buttons">
                    <button id="startPythonServiceBtn" class="btn btn-success btn-sm" disabled>
                        <i class="fas fa-play"></i> <span data-i18n="gpuMonitor.start">启动</span>
                    </button>
                    <button id="stopPythonServiceBtn" class="btn btn-danger btn-sm" disabled>
                        <i class="fas fa-stop"></i> <span data-i18n="gpuMonitor.stop">停止</span>
                    </button>
                    <button id="restartPythonServiceBtn" class="btn btn-warning btn-sm" disabled>
                        <i class="fas fa-redo"></i> <span data-i18n="gpuMonitor.restart">重启</span>
                    </button>
                </div>
            </div>

            <div class="config-management-panel monitor-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-cog"></i> <span data-i18n="gpuMonitor.configManagement">配置管理</span></h3>
                    <div class="config-actions">
                        <button id="refreshConfigBtn" class="btn btn-outline btn-sm" data-i18n-title="common.refresh" title="刷新配置">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button id="editConfigBtn" class="btn btn-outline btn-sm" data-i18n-title="gpuMonitor.editConfig" title="编辑配置">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                </div>

                <div id="configContent" class="config-content">
                    <div class="status-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span data-i18n="common.loading">加载中...</span>
                    </div>
                </div>
            </div>

            <div class="controller-integration monitor-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-desktop"></i> <span data-i18n="gpuMonitor.controller">AI控制器</span></h3>
                </div>

                <div class="iframe-container">
                    <iframe id="controllerIframe" src="" frameborder="0" allowfullscreen></iframe>
                    <div id="iframePlaceholder" class="iframe-placeholder">
                        <i class="fas fa-server"></i>
                        <p data-i18n="gpuMonitor.iframePlaceholder">AI控制器未启动或配置</p>
                        <p class="hint" data-i18n="gpuMonitor.iframeHint">请启动 Python 控制器服务以查看详细监控面板</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
